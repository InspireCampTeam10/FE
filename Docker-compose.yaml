version: "3.8"

services:
  eureka:
    image: kdh19/eurekaimg:0.0.2
    container_name: eureka_container
    restart: always
    ports:
      - "8761:8080"
    networks:
      - my_network

  mysql:
    image: mysql:8
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: Book
      MYSQL_USER: springboot
      MYSQL_PASSWORD: p@ssw0rd
    ports:
      - "3308:3306"
    networks:
      - my_network
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      timeout: 5s

  backend:
    image: kimdaehyun2019/springimg:latest
    container_name: backend_container
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/Book?useUnicode=true&characterEncoding=utf-8&serverTimeZone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: springboot
      SPRING_DATASOURCE_PASSWORD: p@ssw0rd
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8080/eureka/
    ports:
      - "8090:8090"
    networks:
      - my_network

  front:
    image: jjabc3758/sports-news:latest
    container_name: front_container
    restart: always
    depends_on:
      - backend
    environment:
      - VITE_REST_API_HOST=backend
      - VITE_REST_API_PORT=8090
    ports:
      - "1000:80"
    networks:
      - my_network
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf

networks:
  my_network:

volumes:
  mysql_data:
